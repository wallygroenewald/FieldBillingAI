{% extends "base.html" %}
{% block content %}

<h2 style="margin-bottom:30px;">Admin Dashboard</h2>

<div class="grid">

    <a href="/admin/users" class="card-link">Manage Users</a>

    <a href="/engineers" class="card-link">Manage Engineers</a>

    <a href="/route-cache" class="card-link">Manage Routes</a>

    <a href="/upload" class="card-link">Upload Billing Data</a>

</div>

<br><br>

<a href="/" class="secondary-btn">Back to Billing</a>

<style>
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.card-link {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100px;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
    text-decoration: none;
    color: white;
    font-size: 18px;
    font-weight: bold;
    transition: 0.3s;
}

.card-link:hover {
    background: rgba(14,165,233,0.3);
    transform: translateY(-4px);
}

.secondary-btn {
    display: inline-block;
    padding: 10px 18px;
    border-radius: 8px;
    background: #334155;
    color: white;
    text-decoration: none;
}

.secondary-btn:hover {
    background: #475569;
}
</style>

{% endblock %}
