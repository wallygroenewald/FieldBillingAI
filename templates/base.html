
<!DOCTYPE html>
<html>
<head>
    <title>{{ title if title else "Field Billing AI" }}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: #f1f5f9;
        }

        .navbar {
            background: rgba(0,0,0,0.4);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar a {
            color: #38bdf8;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
        }

        .navbar a:hover {
            color: #0ea5e9;
        }

        .container {
            padding: 30px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 25px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th, td {
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: rgba(255,255,255,0.08);
        }

        tr:nth-child(even) {
            background-color: rgba(255,255,255,0.04);
        }

        button {
            padding: 6px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            background-color: #0ea5e9;
            color: white;
        }

        button:hover {
            background-color: #0284c7;
        }

        input, textarea {
            border-radius: 6px;
            border: 1px solid #334155;
            background-color: #0f172a;
            color: white;
            padding: 4px;
        }

        .ok { color: #22c55e; font-weight: bold; }
        .error { color: #ef4444; font-weight: bold; }
    </style>
</head>
<div id="toast" class="toast"></div>

<style>
.toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: linear-gradient(90deg, #22c55e, #16a34a);
    color: white;
    padding: 14px 22px;
    border-radius: 10px;
    font-weight: bold;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.4s ease;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    z-index: 9999;
}

.toast.show {
    opacity: 1;
    transform: translateY(0);
}

.toast.error {
    background: linear-gradient(90deg, #ef4444, #dc2626);
}
</style>

<script>
function showToast(message, type="success") {
    const toast = document.getElementById("toast");
    toast.innerText = message;

    toast.classList.remove("error");

    if(type === "error"){
        toast.classList.add("error");
    }

    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
    }, 3000);
}
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBub4R9xbJGOU9YKGk9Vk2WwqfMvUqhkik&libraries=places"></script>

<script>

let autocomplete;
let map;
let marker;
let selectedLat = null;
let selectedLng = null;
let currentEngineerId = null;


function verifyEngineer(engineerId) {

    currentEngineerId = engineerId;

    document.getElementById("verifyModal").style.display = "flex";

    setTimeout(initAutocomplete, 300);
}


function closeVerifyModal(){
    document.getElementById("verifyModal").style.display = "none";
}


function initAutocomplete() {

    const input = document.getElementById("autocomplete_address");

    autocomplete = new google.maps.places.Autocomplete(input, {
        types: ["address"],
        componentRestrictions: { country: "za" }
    });

    map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: -26.2041, lng: 28.0473 },
        zoom: 10,
        mapTypeControl: false
    });

    marker = new google.maps.Marker({
        map: map
    });

    autocomplete.addListener("place_changed", function () {

        const place = autocomplete.getPlace();

        if (!place.geometry) {
            alert("Please select an address from the dropdown list.");
            return;
        }

        selectedLat = place.geometry.location.lat();
        selectedLng = place.geometry.location.lng();

        map.setCenter(place.geometry.location);
        map.setZoom(15);

        marker.setPosition(place.geometry.location);
    });

}


async function saveVerifiedAddress() {

    if (!selectedLat || !selectedLng){
        alert("Please select a valid address.");
        return;
    }

    const address = document.getElementById("autocomplete_address").value;

    const formData = new FormData();
    formData.append("home_address", address);
    formData.append("lat", selectedLat);
    formData.append("lng", selectedLng);

    const response = await fetch("/admin/verify-engineer/" + currentEngineerId, {
        method: "POST",
        body: formData
    });

    const data = await response.json();

    if(data.status === "verified"){
        location.reload();
    } else {
        alert("Error verifying address");
    }

}

</script>
<body>

{% if request.session.get("user_id") %}
<div class="navbar">
    <div>
        <a href="/">Home</a>
        <a href="/upload">Upload</a>
        <a href="/engineers">Engineers</a>
        <a href="/route-cache">Route Cache</a>
        <a href="/admin/users">Users</a>
        <a href="/admin/clients">Clients</a>
        <a href="/admin">Admin</a>
    </div>
    <div>
        Logged in as {{ request.session.get("username") }}
        |
        <a href="/logout">Logout</a>
    </div>
</div>
{% endif %}
<!-- VERIFY ENGINEER MODAL -->

<div id="verifyModal" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:9999;
align-items:center;
justify-content:center;
">

<div style="
background:#0f172a;
padding:25px;
border-radius:10px;
width:500px;
color:white;
">

<h3>Verify Engineer Address</h3>

<input 
    type="text" 
    id="autocomplete_address" 
    placeholder="Start typing address..."
    style="
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border-radius:6px;
    border:1px solid #334155;
    background:#020617;
    color:white;
">

<div id="map" style="
width:100%;
height:250px;
border-radius:8px;
margin-bottom:15px;
"></div>

<div style="display:flex; gap:10px;">

<button onclick="saveVerifiedAddress()" style="
background:#22c55e;
padding:8px 15px;
border:none;
border-radius:6px;
cursor:pointer;
color:black;
font-weight:bold;
">
Save & Verify
</button>

<button onclick="closeVerifyModal()" style="
background:#ef4444;
padding:8px 15px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
">
Cancel
</button>

</div>

</div>
</div>
<div class="container">
    <div class="card">
        {% block content %}{% endblock %}
    </div>
</div>

</body>
</html>
