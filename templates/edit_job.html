{% extends "base.html" %}
{% block content %}
<!DOCTYPE html>
<html>
<head>
    <title>Edit Job</title>
</head>
<body>

<h2>Edit Job #{{ job[0] }}</h2>

<form method="post">
    <label>Origin</label><br>
    <input type="text" name="origin" value="{{ job[1] }}" required><br><br>

    <label>Destination</label><br>
    <input type="text" name="destination" value="{{ job[2] }}" required><br><br>

    <label>Distance (km)</label><br>
    <input type="number" step="0.01" name="distance_km" value="{{ job[3] }}" required><br><br>

    <label>Duration (minutes)</label><br>
    <input type="number" step="0.1" name="duration_minutes" value="{{ job[4] }}" required><br><br>

    <button type="submit">Save Changes</button>
</form>

<br>
<a href="/admin">← Back to Admin</a>

</body>
</html>
<td>
    <a href="/edit-job/{{ job[0] }}">Edit</a> |
    <a href="/delete-job/{{ job[0] }}">Delete</a>
</td>
{% endblock %}
