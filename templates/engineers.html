{% extends "base.html" %}
{% block content %}

<h1>Engineers</h1>
<hr>

<h3>Add Engineer</h3>
<form method="post" action="/add-engineer" style="margin-bottom:20px;">
    <input name="name" placeholder="Engineer Name" required>
    <input name="home_address" placeholder="Home Address" required>
    <button>Add Engineer</button>
</form>

<table border="1" cellpadding="8" width="100%">
<tr>
<th>Name</th>
<th>Address</th>
<th>Lat</th>
<th>Lng</th>
<th>Verified</th>
<th>Map</th>
<th>Actions</th>
</tr>

{% for e in engineers %}
<tr>

<td>{{ e[1] }}</td>

<td>
    <input id="addr_{{ e[0] }}" value="{{ e[2] }}">
</td>

<td>{{ e[3] }}</td>
<td>{{ e[4] }}</td>

<td style="text-align:center;">
    {% if e[5] == 1 %}
        <span style="color:lime; font-size:18px;">✔</span>
    {% else %}
        <span style="color:orange;">Pending</span>
    {% endif %}
</td>

<td>
    <a href="https://www.google.com/maps?q={{ e[3] }},{{ e[4] }}" target="_blank">
        📍 View
    </a>
</td>

<td>

<button onclick="updateEngineer({{ e[0] }})">
Save & Verify
</button>

<button onclick="recalcEngineer({{ e[0] }})">
Recalculate Jobs
</button>

<form method="post" action="/admin/delete-engineer/{{ e[0] }}" style="display:inline;">
    <button style="background:red;">Delete</button>
</form>

</td>

</tr>
{% endfor %}
</table>

<script>
async function updateEngineer(id) {

    const addr = document.getElementById("addr_" + id).value;

    const formData = new FormData();
    formData.append("home_address", addr);

    const response = await fetch("/admin/update-engineer/" + id, {
        method: "POST",
        body: formData
    });

    const data = await response.json();

    if (data.status === "success") {
        location.reload();
    } else {
        alert("Geocode failed.");
    }
}

async function recalcEngineer(id) {

    if (!confirm("Recalculate ALL jobs for this engineer?")) return;

    const response = await fetch("/admin/recalculate-engineer/" + id, {
        method: "POST"
    });

    const data = await response.json();

    if (data.status === "done") {
        alert("All jobs recalculated.");
    } else {
        alert("Error recalculating.");
    }
}
</script>

{% endblock %}
