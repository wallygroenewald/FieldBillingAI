{% extends "base.html" %}
{% block content %}

<h2 style="margin-bottom:20px;">Upload Billing File</h2>

<form method="post" action="/upload" enctype="multipart/form-data" class="upload-box" id="uploadForm">
    
    <div style="margin-bottom:20px;">
        <input type="file" name="file" id="fileInput" required>
    </div>

    <button type="submit" id="uploadBtn">Upload File</button>

</form>

<!-- Upload Progress Section -->
<div id="uploadStatus" style="display:none; margin-top:25px;">
    <strong style="font-size:16px;">Uploading file... please wait ⏳</strong>

    <div style="width:100%; background:#1e293b; border-radius:8px; margin-top:15px; overflow:hidden;">
        <div id="progressBar"></div>
    </div>
</div>

<style>
.upload-box {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 15px;
}

input[type="file"] {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #334155;
    background-color: #0f172a;
    color: white;
}

input[type="file"]::file-selector-button {
    background-color: #0ea5e9;
    border: none;
    padding: 8px 12px;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

input[type="file"]::file-selector-button:hover {
    background-color: #0284c7;
}

/* Progress Bar */
#progressBar {
    width: 100%;
    height: 20px;
    background: linear-gradient(
        90deg,
        #0ea5e9,
        #38bdf8,
        #0ea5e9
    );
    background-size: 200% 100%;
    animation: loading 1.5s infinite linear;
}

/* Animated shimmer effect */
@keyframes loading {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}
</style>

<script>
document.getElementById("uploadForm").addEventListener("submit", function() {

    // Disable button
    document.getElementById("uploadBtn").disabled = true;
    document.getElementById("uploadBtn").innerText = "Uploading...";

    // Show progress section
    document.getElementById("uploadStatus").style.display = "block";

});
</script>

{% endblock %}
